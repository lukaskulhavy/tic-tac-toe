<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a0c4ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a0c4ff; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px rgba(233, 69, 96, 0.6);
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.6rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.03); }

    #restart {
      background: #e94560;
      color: #fff;
    }

    #mode-btn {
      background: #0f3460;
      color: #a0c4ff;
      border: 1px solid #a0c4ff44;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { font-weight: bold; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-btn">vs CPU</button>
  </div>

  <div id="score">
    X wins: <span id="x-wins">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="draws">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="o-wins">0</span>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, vsCPU;
    let score = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const modeBtn = document.getElementById('mode-btn');

    vsCPU = false;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: 'draw' };
      return null;
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      place(i, current);
      const result = checkWinner();
      if (result) { endGame(result); return; }
      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;
      if (vsCPU && current === 'O' && !gameOver) {
        setTimeout(cpuMove, 400);
      }
    }

    function place(i, player) {
      board[i] = player;
      cells[i].textContent = player;
      cells[i].classList.add(player.toLowerCase(), 'taken');
    }

    function endGame({ winner, line }) {
      gameOver = true;
      if (winner === 'draw') {
        status.textContent = "It's a draw!";
        score.draw++;
        document.getElementById('draws').textContent = score.draw;
      } else {
        status.textContent = `${winner} wins!`;
        line.forEach(i => cells[i].classList.add('win'));
        score[winner]++;
        document.getElementById('x-wins').textContent = score.X;
        document.getElementById('o-wins').textContent = score.O;
      }
    }

    // Minimax CPU
    function cpuMove() {
      const best = minimax(board, 'O');
      place(best.idx, 'O');
      const result = checkWinner();
      if (result) { endGame(result); return; }
      current = 'X';
      status.textContent = "X's turn";
    }

    function minimax(b, player, depth = 0) {
      const result = checkWinner();
      if (result) {
        if (result.winner === 'O') return { score: 10 - depth };
        if (result.winner === 'X') return { score: depth - 10 };
        return { score: 0 };
      }

      const moves = [];
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = player;
          const s = minimax(b, player === 'O' ? 'X' : 'O', depth + 1);
          moves.push({ idx: i, score: s.score });
          b[i] = '';
        }
      }

      if (player === 'O') {
        return moves.reduce((best, m) => m.score > best.score ? m : best, { score: -Infinity });
      } else {
        return moves.reduce((best, m) => m.score < best.score ? m : best, { score: Infinity });
      }
    }

    cells.forEach(c => c.addEventListener('click', () => handleClick(+c.dataset.i)));

    document.getElementById('restart').addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
      score = { X: 0, O: 0, draw: 0 };
      document.getElementById('x-wins').textContent = 0;
      document.getElementById('o-wins').textContent = 0;
      document.getElementById('draws').textContent = 0;
      init();
    });

    init();
  </script>
</body>
</html>
